name: Arbitrage Bot

on:
  schedule:
    - cron: '*/45 * * * *'      # cada 45 minutos
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - dry-run
          - verbose

concurrency:
  group: arbitrage-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install
        run: npm install --no-audit --no-fund || true

      - name: 🤖 Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN:            ${{ github.event.inputs.mode == 'dry-run' && '1' || '' }}
          VERBOSE:            ${{ github.event.inputs.mode == 'verbose' && '1' || '' }}
        run: node src/index.js

      - name: 💾 Commit state
        if: always()
        run: |
          git config --local user.email "bot@arbitrage-bot"
          git config --local user.name "Arbitrage Bot"
          git add -f seen_items.json price_cache.json stats.json signals.log 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push || true

      - name: 🚨 Alerta Telegram si falla
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode=HTML \
              --data-urlencode text="🚨 <b>Arbitrage Bot falló</b>%0ARun: <a href=\"${RUN_URL}\">ver logs</a>" \
              > /dev/null || true
          fi
