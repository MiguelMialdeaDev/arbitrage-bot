name: Arbitrage Bot

on:
  schedule:
    # GitHub Actions throttlea agresivamente los cron de repos gratuitos.
    # Aunque declaremos cada 15min, en la práctica termina siendo ~1/hora
    # con saltos (verificado con gh run list). Para conseguir cadencia real
    # de 15min configuramos un cron EXTERNO (cron-job.org gratis) que dispare
    # workflow_dispatch vía API GitHub. Los dispatch manuales NO se throttlean.
    # Ver CRON_SETUP.md con los pasos exactos.
    #
    # Estas líneas scheduled quedan como red de seguridad: si el cron externo
    # se cae, GitHub igual corre el bot aprox 1/hora.
    - cron: '7 * * * *'
    - cron: '37 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - dry-run
          - verbose
          - test-notify      # envía mensaje test a Telegram/ntfy sin correr el bot

concurrency:
  group: arbitrage-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install
        run: npm install --no-audit --no-fund || true

      - name: 📣 Test notify (only in test-notify mode)
        if: github.event.inputs.mode == 'test-notify'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
        run: |
          TEXT="🤖 <b>Arbitrage Bot · test</b>%0ASi lees esto, los secrets están OK.%0ACron activo cada 15 min."
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" -d parse_mode=HTML \
              --data-urlencode text="${TEXT}")
            echo "Telegram response: $(echo $RESP | head -c 200)"
          else
            echo "Telegram no configurado (falta token o chat_id)"
          fi
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s -X POST "https://ntfy.sh/${NTFY_TOPIC}" \
              -H "Title: Arbitrage Bot test" -H "Priority: default" \
              -d "Si lees esto, ntfy funciona. Cron cada 15 min." || true
            echo "ntfy enviado al topic"
          fi
          exit 0

      - name: 🤖 Run bot
        if: github.event.inputs.mode != 'test-notify'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
          DRY_RUN:            ${{ github.event.inputs.mode == 'dry-run' && '1' || '' }}
          VERBOSE:            ${{ github.event.inputs.mode == 'verbose' && '1' || '' }}
        run: node src/index.js

      - name: 💾 Commit state + reports
        if: always() && github.event.inputs.mode != 'test-notify'
        run: |
          git config --local user.email "bot@arbitrage-bot"
          git config --local user.name "Arbitrage Bot"
          git add -f seen_items.json price_cache.json stats.json signals.log reports/ data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update state + report [skip ci]"
          # Intentar push hasta 3 veces con pull --rebase en caso de conflicto
          for i in 1 2 3; do
            if git push 2>&1; then break; fi
            echo "Push falló, pull --rebase y reintentar ($i/3)..."
            git pull --rebase origin main 2>&1 || git rebase --abort
            sleep 2
          done

      - name: 🚨 Alerta si falla
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode=HTML \
              --data-urlencode text="🚨 Arbitrage Bot falló · Run: ${RUN_URL}" > /dev/null || true
          fi
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s -X POST "https://ntfy.sh/${NTFY_TOPIC}" \
              -H "Title: Arbitrage Bot falló" \
              -H "Priority: high" \
              -H "Tags: warning" \
              -d "Run: ${RUN_URL}" > /dev/null || true
          fi
